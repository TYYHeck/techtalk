version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: techtalk-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: TechTalk@2024!
      MYSQL_DATABASE: techtalk
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/src/main/resources/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - techtalk_net

  redis:
    image: redis:7-alpine
    container_name: techtalk-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - techtalk_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techtalk-backend
    restart: always
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/techtalk?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: TechTalk@2024!
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      TZ: Asia/Shanghai
    networks:
      - techtalk_net

volumes:
  mysql_data:
  redis_data:

networks:
  techtalk_net:
    driver: bridge
